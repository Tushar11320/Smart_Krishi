  client-id: ${GOOGLE_CLIENT_ID:958624899323-qp4amk6u9u0auos480om71q016pugo39.apps.googleusercontent.com}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}



# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    enabled: true
  show-actuator: true
  use-fqn: true

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:4200,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:4200,https://smart-krishi-three.vercel.app}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

