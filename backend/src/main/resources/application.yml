spring:
  application:
    name: smart-krishi-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:${DB_URL:jdbc:mysql://localhost:3306/defaultdb}}
    username: ${DB_USERNAME:${DATABASE_USERNAME:root}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false
  
  # Flyway Configuration
  flyway:
    enabled: false
    locations: classpath:db/migration
    baselineOnMigrate: true
    validateOnMigrate: true
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
  
  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Security
  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration: 86400000 # 24 hours
      refresh-expiration: 604800000 # 7 days

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

# Server Configuration
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Logging Configuration
logging:
  level:
    root: INFO
    com.smartkrishi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.mail: DEBUG
    org.eclipse.angus.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-krishi.log
    max-size: 10MB
    max-history: 10

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:yl7gvzt}
  api-key: ${CLOUDINARY_API_KEY:723828689573913} 
  api-secret: ${CLOUDINARY_API_SECRET:Onda8ZIqBRxJixCgC2cCYdmCvUA}

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:key_id}
  key-secret: ${RAZORPAY_KEY_SECRET:key_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:webhook_secret}


# OpenWeather Configuration
