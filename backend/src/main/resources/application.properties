# Gmail SMTP Configuration for Smart Krishi Backend
spring.mail.host=${MAIL_HOST:${SPRING_MAIL_HOST:${EMAIL_HOST:smtp.gmail.com}}}
spring.mail.port=${MAIL_PORT:${SPRING_MAIL_PORT:${EMAIL_PORT:587}}}
spring.mail.username=${MAIL_USERNAME:${EMAIL_USER:${SPRING_MAIL_USERNAME:}}}
spring.mail.password=${MAIL_PASSWORD:${EMAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}}

# SMTP Timeout Configurations (Requirement 1: 30000ms = 30s)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.debug=true
