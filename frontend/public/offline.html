<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Smart Krishi</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0fdf4;
      color: #064e3b;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 30px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(6, 78, 59, 0.05);
      border: 1px solid #dcfce7;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.8; }
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
      font-weight: 800;
      color: #064e3b;
    }
    p {
      color: #374151;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
    }
    button {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      transition: all 0.2s ease;
    }
    button:hover {
      background-color: #059669;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>No Connection</h1>
    <p>We are unable to connect to the Smart Krishi network right now. Please check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
